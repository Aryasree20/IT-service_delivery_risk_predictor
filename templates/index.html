<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Risk Predictor</title>
  <link rel="stylesheet"href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header>
    <h1>Delivery Risk Predictor</h1>
    <p>Enter project details to predict risk (High / Medium / Low)</p>
  </header>

  <div class="form-container">
    <form action="/predict" method="post">
      <div class="form-header">
        <h2>Please Fill The Information</h2>
      </div>

      <div>
        <label for="planned_duration_days">Planned Duration (days):</label>
        <input type="number" name="planned_duration_days" required>
      </div>

      <div>
        <label for="actual_duration_days">Actual Duration (days):</label>
        <input type="number" name="actual_duration_days" required>
      </div>

      <div>
        <label for="team_size">Team Size:</label>
        <input type="number" name="team_size" required>
      </div>

      <div>
        <label for="num_bugs">Number of Bugs:</label>
        <input type="number" name="num_bugs" required>
      </div>

      <div>
        <label for="num_change_requests">Number of Change Requests:</label>
        <input type="number" name="num_change_requests" required>
      </div>


      <div>
        <label for="budget_overrun_pct">Budget Overrun (%):</label>
        <input type="number" step="0.01" name="budget_overrun_pct" required>
      </div>

      <button type="submit">Predict Risk</button>
    </form>
  </div>
</body>
</html>
